<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Route CH" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="manifest" href="manifest.json" />
<title>Route CH — Switzerland Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body { background:#F2F2F0; overscroll-behavior-y: none; }
  ::-webkit-scrollbar { width: 0px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useMemo } = React;

// ---------- Icon atoms (replacing lucide-react so no bundler is needed) ----------
const Icon = ({ children, size = 18, ...props }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
    {children}
  </svg>
);
const ChevronLeft = (p) => <Icon {...p}><polyline points="15 18 9 12 15 6" /></Icon>;
const ChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6" /></Icon>;
const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></Icon>;
const Trash2 = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" /><path d="M10 11v6" /><path d="M14 11v6" /><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" /></Icon>;
const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12" /></Icon>;
const Loader2 = (p) => <Icon {...p} className={`animate-spin ${p.className||""}`}><path d="M21 12a9 9 0 1 1-6.219-8.56" /></Icon>;

// ---------- Date helpers ----------
const pad = (n) => String(n).padStart(2, "0");
const toDateKey = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const toMonthKey = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}`;
const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
const getMonday = (d) => { const r = new Date(d); const day = r.getDay(); const diff = (day === 0 ? -6 : 1) - day; return addDays(r, diff); };
const fmtLong = (d) => d.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
const fmtShort = (d) => d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
const monthLabel = (key) => { const [y, m] = key.split("-"); return new Date(+y, +m - 1, 1).toLocaleDateString("en-GB", { month: "long", year: "numeric" }); };

const DEADLINE = new Date(2027, 10, 30);
const INTAKE = new Date(2028, 8, 15);
const daysBetween = (a, b) => Math.ceil((b.setHours(0,0,0,0) - a.setHours(0,0,0,0)) / 86400000);

const HABITS = [
  "Math / quant practice",
  "Python or PySpark practice",
  "Project work block",
  "Paper reading / writing",
];

const CATEGORIES = ["GRE", "GATE", "AWS ML", "Math", "Python", "PySpark", "Projects", "Papers", "IELTS"];

const PHASES = [
  { name: "1 — Foundation", start: "2026-07", end: "2026-12" },
  { name: "2 — Build & Certify", start: "2027-01", end: "2027-07" },
  { name: "3 — Application Crunch", start: "2027-08", end: "2027-11" },
  { name: "4 — Decisions", start: "2027-12", end: "2028-04" },
  { name: "5 — Pre-departure", start: "2028-05", end: "2028-08" },
  { name: "6 — Arrival", start: "2028-09", end: "2028-09" },
];

const MILESTONES = {
  "2026-07": ["Diagnostic GRE practice test", "Diagnostic IELTS mock", "Start linear algebra / stats course", "Start Python fundamentals"],
  "2026-08": ["Continue math course", "Python: OOP, numpy, pandas"],
  "2026-09": ["Start PySpark basics", "Draft shortlist of 15–20 Swiss/EU programs"],
  "2026-10": ["Start Project 1 (PySpark / ML)", "Finish math course"],
  "2026-11": ["Continue Project 1"],
  "2026-12": ["Finish Project 1, push to GitHub with README", "Read 8–10 papers in target subfield", "Find research mentor / angle"],
  "2027-01": ["GATE final revision sprint", "Start AWS ML Associate syllabus"],
  "2027-02": ["Sit GATE exam (6–21 Feb)", "Shift focus to AWS prep"],
  "2027-03": ["Sit AWS ML Associate exam", "Start Project 2"],
  "2027-04": ["Continue Project 2", "Begin research paper: methodology + initial experiments"],
  "2027-05": ["Take IELTS", "Continue paper experiments / writing"],
  "2027-06": ["Finish Project 2", "Submit paper (workshop / arXiv / student conference)"],
  "2027-07": ["Take GRE (only if required)", "Buffer month for retakes"],
  "2027-08": ["Finalize shortlist (6–10 programs)", "Request LORs (2–3 months notice)"],
  "2027-09": ["Draft SOP master version + tailor per program", "Finalize CV"],
  "2027-10": ["Get SOP/CV feedback", "Fill out application forms early"],
  "2027-11": ["Submit all applications (5+ days early)"],
  "2027-12": ["Track decision timelines", "Prepare for interviews"],
  "2028-01": ["Interview prep", "Optional second GATE sitting if needed"],
  "2028-02": ["Continue paper revisions / second submission"],
  "2028-03": ["Await decisions"],
  "2028-04": ["Finalize decision among offers"],
  "2028-05": ["Start visa application", "Financial proof / blocked account setup"],
  "2028-06": ["Housing search", "Continue visa process"],
  "2028-07": ["Basic German / French phrases", "Finalize visa"],
  "2028-08": ["Pack / travel logistics", "Final admin"],
  "2028-09": ["Arrival, orientation, matriculation"],
};

const ALL_MONTHS = Object.keys(MILESTONES);

// ---------- Storage helpers (localStorage-backed, replaces Claude's window.storage) ----------
const STORAGE_PREFIX = "route-ch:";
async function loadKey(key, fallback) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + key);
    if (raw) return JSON.parse(raw);
    return fallback;
  } catch {
    return fallback;
  }
}
async function saveKey(key, value) {
  try {
    localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value));
  } catch {
    // storage full or unavailable, silent fail (UI already updated optimistically)
  }
}

// ---------- Small UI atoms ----------
function CheckRow({ checked, onToggle, children, onDelete }) {
  return (
    <div className="flex items-center gap-3 py-2.5 border-b border-neutral-200 last:border-0 group">
      <button onClick={onToggle} className="shrink-0" aria-label="toggle">
        {checked ? (
          <span className="w-5 h-5 rounded-sm bg-[#DA291C] flex items-center justify-center">
            <Check size={14} strokeWidth={3} className="text-white" />
          </span>
        ) : (
          <span className="w-5 h-5 rounded-sm border-2 border-neutral-300" />
        )}
      </button>
      <span className={`flex-1 text-[15px] ${checked ? "line-through text-neutral-400" : "text-neutral-800"}`}>{children}</span>
      {onDelete && (
        <button onClick={onDelete} className="opacity-0 group-hover:opacity-100 text-neutral-300 hover:text-[#DA291C] transition-opacity">
          <Trash2 size={15} />
        </button>
      )}
    </div>
  );
}

function AddRow({ placeholder, onAdd }) {
  const [val, setVal] = useState("");
  const submit = () => { if (val.trim()) { onAdd(val.trim()); setVal(""); } };
  return (
    <div className="flex items-center gap-2 pt-3">
      <input
        value={val}
        onChange={(e) => setVal(e.target.value)}
        onKeyDown={(e) => e.key === "Enter" && submit()}
        placeholder={placeholder}
        className="flex-1 text-sm border border-neutral-300 rounded-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#DA291C] focus:border-transparent"
      />
      <button onClick={submit} className="w-9 h-9 shrink-0 bg-neutral-900 text-white rounded-sm flex items-center justify-center hover:bg-[#DA291C] transition-colors">
        <Plus size={17} />
      </button>
    </div>
  );
}

function SectionLabel({ index, children }) {
  return (
    <div className="flex items-baseline gap-2 mb-3">
      <span className="text-[#DA291C] font-mono text-xs tracking-widest">{index}</span>
      <h3 className="text-xs uppercase tracking-[0.15em] text-neutral-500 font-semibold">{children}</h3>
    </div>
  );
}

// ---------- Departure board hero ----------
function FlipDigits({ value, label }) {
  const digits = String(Math.max(value, 0)).padStart(3, "0").split("");
  return (
    <div className="flex flex-col items-center">
      <div className="flex gap-1">
        {digits.map((d, i) => (
          <div key={i} className="w-9 h-12 sm:w-11 sm:h-14 bg-black rounded-[2px] flex items-center justify-center border border-neutral-800 relative overflow-hidden">
            <span className="text-[#DA291C] font-mono text-2xl sm:text-3xl font-bold tabular-nums">{d}</span>
            <div className="absolute left-0 right-0 top-1/2 h-px bg-neutral-950" />
          </div>
        ))}
      </div>
      <span className="mt-2 text-[10px] tracking-[0.2em] uppercase text-neutral-400 text-center">{label}</span>
    </div>
  );
}

function DepartureBoard() {
  const today = new Date();
  const dDeadline = daysBetween(new Date(today), new Date(DEADLINE));
  const dIntake = daysBetween(new Date(today), new Date(INTAKE));
  return (
    <div className="bg-neutral-950 rounded-md px-5 py-6 sm:px-8 sm:py-7 flex flex-col sm:flex-row items-center justify-between gap-6">
      <div>
        <div className="text-white text-sm tracking-[0.2em] uppercase font-semibold">Route CH — 2028</div>
        <div className="text-neutral-500 text-xs mt-1">Data Analyst → MSc Switzerland</div>
      </div>
      <div className="flex gap-8 sm:gap-12">
        <FlipDigits value={dDeadline} label="Days to Application Deadline" />
        <FlipDigits value={dIntake} label="Days to September Intake" />
      </div>
    </div>
  );
}

// ---------- DAY VIEW ----------
function DayView() {
  const [date, setDate] = useState(new Date());
  const [data, setData] = useState(null);
  const key = `day:${toDateKey(date)}`;

  useEffect(() => {
    let alive = true;
    setData(null);
    loadKey(key, { habits: {}, tasks: [] }).then((d) => alive && setData(d));
    return () => { alive = false; };
  }, [key]);

  const update = (next) => { setData(next); saveKey(key, next); };
  const toggleHabit = (i) => update({ ...data, habits: { ...data.habits, [i]: !data.habits[i] } });
  const toggleTask = (id) => update({ ...data, tasks: data.tasks.map((t) => (t.id === id ? { ...t, done: !t.done } : t)) });
  const addTask = (text) => update({ ...data, tasks: [...data.tasks, { id: Date.now(), text, done: false }] });
  const delTask = (id) => update({ ...data, tasks: data.tasks.filter((t) => t.id !== id) });

  if (!data) return <div className="flex justify-center py-16"><Loader2 className="text-neutral-400" /></div>;

  const doneCount = Object.values(data.habits).filter(Boolean).length + data.tasks.filter((t) => t.done).length;
  const totalCount = HABITS.length + data.tasks.length;

  return (
    <div>
      <div className="flex items-center justify-between mb-5">
        <button onClick={() => setDate(addDays(date, -1))} className="p-2 hover:bg-neutral-100 rounded-sm"><ChevronLeft size={18} /></button>
        <div className="text-center">
          <div className="text-[15px] font-semibold text-neutral-900">{fmtLong(date)}</div>
          <button onClick={() => setDate(new Date())} className="text-xs text-[#DA291C] hover:underline mt-0.5">Today</button>
        </div>
        <button onClick={() => setDate(addDays(date, 1))} className="p-2 hover:bg-neutral-100 rounded-sm"><ChevronRight size={18} /></button>
      </div>

      <div className="mb-6">
        <div className="h-1.5 w-full bg-neutral-200 rounded-full overflow-hidden">
          <div className="h-full bg-[#DA291C] transition-all" style={{ width: totalCount ? `${(doneCount / totalCount) * 100}%` : "0%" }} />
        </div>
        <div className="text-xs text-neutral-500 mt-1.5">{doneCount}/{totalCount} done today</div>
      </div>

      <SectionLabel index="01">Daily Habits</SectionLabel>
      <div className="mb-6">
        {HABITS.map((h, i) => (
          <CheckRow key={i} checked={!!data.habits[i]} onToggle={() => toggleHabit(i)}>{h}</CheckRow>
        ))}
      </div>

      <SectionLabel index="02">Today's Tasks</SectionLabel>
      <div>
        {data.tasks.length === 0 && <div className="text-sm text-neutral-400 py-2">No tasks added yet.</div>}
        {data.tasks.map((t) => (
          <CheckRow key={t.id} checked={t.done} onToggle={() => toggleTask(t.id)} onDelete={() => delTask(t.id)}>{t.text}</CheckRow>
        ))}
        <AddRow placeholder="Add a task for today..." onAdd={addTask} />
      </div>
    </div>
  );
}

// ---------- WEEK VIEW ----------
function WeekView() {
  const [anchor, setAnchor] = useState(getMonday(new Date()));
  const [data, setData] = useState(null);
  const key = `week:${toDateKey(anchor)}`;
  const weekEnd = addDays(anchor, 6);

  useEffect(() => {
    let alive = true;
    setData(null);
    loadKey(key, { targets: {}, logged: {}, goals: [] }).then((d) => alive && setData(d));
    return () => { alive = false; };
  }, [key]);

  const update = (next) => { setData(next); saveKey(key, next); };
  const setHours = (field, cat, val) => update({ ...data, [field]: { ...data[field], [cat]: val } });
  const toggleGoal = (id) => update({ ...data, goals: data.goals.map((g) => (g.id === id ? { ...g, done: !g.done } : g)) });
  const addGoal = (text) => update({ ...data, goals: [...data.goals, { id: Date.now(), text, done: false }] });
  const delGoal = (id) => update({ ...data, goals: data.goals.filter((g) => g.id !== id) });

  if (!data) return <div className="flex justify-center py-16"><Loader2 className="text-neutral-400" /></div>;

  const totalLogged = CATEGORIES.reduce((s, c) => s + (parseFloat(data.logged[c]) || 0), 0);
  const totalTarget = CATEGORIES.reduce((s, c) => s + (parseFloat(data.targets[c]) || 0), 0);

  return (
    <div>
      <div className="flex items-center justify-between mb-5">
        <button onClick={() => setAnchor(addDays(anchor, -7))} className="p-2 hover:bg-neutral-100 rounded-sm"><ChevronLeft size={18} /></button>
        <div className="text-center">
          <div className="text-[15px] font-semibold text-neutral-900">{fmtShort(anchor)} – {fmtShort(weekEnd)}</div>
          <button onClick={() => setAnchor(getMonday(new Date()))} className="text-xs text-[#DA291C] hover:underline mt-0.5">This week</button>
        </div>
        <button onClick={() => setAnchor(addDays(anchor, 7))} className="p-2 hover:bg-neutral-100 rounded-sm"><ChevronRight size={18} /></button>
      </div>

      <div className="mb-6 flex items-center justify-between text-xs text-neutral-500 bg-neutral-100 rounded-sm px-3 py-2">
        <span>Hours logged this week</span>
        <span className="font-mono text-neutral-800 font-semibold">{totalLogged}{totalTarget ? ` / ${totalTarget}` : ""} hrs</span>
      </div>

      <SectionLabel index="01">Hours by Category</SectionLabel>
      <div className="mb-6 grid grid-cols-1 gap-2">
        {CATEGORIES.map((cat) => (
          <div key={cat} className="flex items-center gap-2 text-sm">
            <span className="w-20 shrink-0 text-neutral-700">{cat}</span>
            <input type="number" min="0" placeholder="target" value={data.targets[cat] ?? ""} onChange={(e) => setHours("targets", cat, e.target.value)}
              className="w-16 border border-neutral-300 rounded-sm px-2 py-1 text-xs" />
            <span className="text-neutral-300">/</span>
            <input type="number" min="0" placeholder="actual" value={data.logged[cat] ?? ""} onChange={(e) => setHours("logged", cat, e.target.value)}
              className="w-16 border border-neutral-300 rounded-sm px-2 py-1 text-xs" />
            <span className="text-[10px] text-neutral-400 uppercase">hrs</span>
          </div>
        ))}
      </div>

      <SectionLabel index="02">Weekly Goals</SectionLabel>
      <div>
        {data.goals.length === 0 && <div className="text-sm text-neutral-400 py-2">No goals added yet.</div>}
        {data.goals.map((g) => (
          <CheckRow key={g.id} checked={g.done} onToggle={() => toggleGoal(g.id)} onDelete={() => delGoal(g.id)}>{g.text}</CheckRow>
        ))}
        <AddRow placeholder="Add a goal for this week..." onAdd={addGoal} />
      </div>
    </div>
  );
}

// ---------- MONTH VIEW ----------
function MonthView() {
  const [idx, setIdx] = useState(() => {
    const cur = toMonthKey(new Date());
    const i = ALL_MONTHS.indexOf(cur);
    return i === -1 ? 0 : i;
  });
  const monthKey = ALL_MONTHS[idx];
  const [data, setData] = useState(null);
  const key = `month:${monthKey}`;
  const preset = MILESTONES[monthKey] || [];

  useEffect(() => {
    let alive = true;
    setData(null);
    loadKey(key, { done: {}, custom: [] }).then((d) => alive && setData(d));
    return () => { alive = false; };
  }, [key]);

  const update = (next) => { setData(next); saveKey(key, next); };
  const toggle = (id) => update({ ...data, done: { ...data.done, [id]: !data.done[id] } });
  const addCustom = (text) => update({ ...data, custom: [...data.custom, { id: `c${Date.now()}`, text }] });
  const delCustom = (id) => {
    const { [id]: _, ...restDone } = data.done;
    update({ ...data, custom: data.custom.filter((c) => c.id !== id), done: restDone });
  };

  if (!data) return <div className="flex justify-center py-16"><Loader2 className="text-neutral-400" /></div>;

  const allItems = [...preset.map((t, i) => ({ id: `p${i}`, text: t })), ...data.custom];
  const doneCount = allItems.filter((it) => data.done[it.id]).length;

  return (
    <div>
      <div className="flex items-center justify-between mb-5">
        <button onClick={() => setIdx((i) => Math.max(0, i - 1))} disabled={idx === 0} className="p-2 hover:bg-neutral-100 rounded-sm disabled:opacity-30"><ChevronLeft size={18} /></button>
        <div className="text-center">
          <div className="text-[15px] font-semibold text-neutral-900">{monthLabel(monthKey)}</div>
          <div className="text-xs text-neutral-400 mt-0.5">{doneCount}/{allItems.length} milestones</div>
        </div>
        <button onClick={() => setIdx((i) => Math.min(ALL_MONTHS.length - 1, i + 1))} disabled={idx === ALL_MONTHS.length - 1} className="p-2 hover:bg-neutral-100 rounded-sm disabled:opacity-30"><ChevronRight size={18} /></button>
      </div>

      <div className="mb-6 h-1.5 w-full bg-neutral-200 rounded-full overflow-hidden">
        <div className="h-full bg-[#DA291C] transition-all" style={{ width: allItems.length ? `${(doneCount / allItems.length) * 100}%` : "0%" }} />
      </div>

      <SectionLabel index="01">Milestones</SectionLabel>
      <div>
        {preset.map((t, i) => (
          <CheckRow key={`p${i}`} checked={!!data.done[`p${i}`]} onToggle={() => toggle(`p${i}`)}>{t}</CheckRow>
        ))}
        {data.custom.map((c) => (
          <CheckRow key={c.id} checked={!!data.done[c.id]} onToggle={() => toggle(c.id)} onDelete={() => delCustom(c.id)}>{c.text}</CheckRow>
        ))}
        <AddRow placeholder="Add a milestone for this month..." onAdd={addCustom} />
      </div>
    </div>
  );
}

// ---------- YEAR VIEW ----------
function YearView() {
  const [phaseData, setPhaseData] = useState(null);

  useEffect(() => {
    let alive = true;
    (async () => {
      const monthsInRange = (start, end) => ALL_MONTHS.filter((m) => m >= start && m <= end);
      const results = await Promise.all(
        PHASES.map(async (phase) => {
          const months = monthsInRange(phase.start, phase.end);
          let total = 0, done = 0;
          for (const m of months) {
            const preset = MILESTONES[m] || [];
            const d = await loadKey(`month:${m}`, { done: {}, custom: [] });
            const items = [...preset.map((_, i) => `p${i}`), ...d.custom.map((c) => c.id)];
            total += items.length;
            done += items.filter((id) => d.done[id]).length;
          }
          return { ...phase, total, done };
        })
      );
      if (alive) setPhaseData(results);
    })();
    return () => { alive = false; };
  }, []);

  const today = new Date();

  if (!phaseData) return <div className="flex justify-center py-16"><Loader2 className="text-neutral-400" /></div>;

  return (
    <div>
      <SectionLabel index="01">Timeline — Jul 2026 to Sep 2028</SectionLabel>
      <div className="space-y-4 mb-2">
        {phaseData.map((p) => {
          const pct = p.total ? Math.round((p.done / p.total) * 100) : 0;
          const startD = new Date(+p.start.split("-")[0], +p.start.split("-")[1] - 1, 1);
          const endD = new Date(+p.end.split("-")[0], +p.end.split("-")[1], 0);
          const isActive = today >= startD && today <= endD;
          return (
            <div key={p.name} className={`rounded-sm p-3 ${isActive ? "bg-neutral-950" : "bg-neutral-100"}`}>
              <div className="flex items-center justify-between mb-2">
                <span className={`text-sm font-semibold ${isActive ? "text-white" : "text-neutral-800"}`}>{p.name}</span>
                <span className={`text-xs font-mono ${isActive ? "text-neutral-400" : "text-neutral-500"}`}>{pct}%</span>
              </div>
              <div className={`h-1.5 rounded-full overflow-hidden ${isActive ? "bg-neutral-800" : "bg-neutral-200"}`}>
                <div className="h-full bg-[#DA291C] transition-all" style={{ width: `${pct}%` }} />
              </div>
              <div className={`text-[11px] mt-1.5 ${isActive ? "text-neutral-500" : "text-neutral-400"}`}>
                {monthLabel(p.start)} – {monthLabel(p.end)} · {p.done}/{p.total} milestones {isActive && "· current phase"}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ---------- APP ----------
function App() {
  const [view, setView] = useState("day");
  const tabs = [
    { id: "day", label: "Daily", idx: "01" },
    { id: "week", label: "Weekly", idx: "02" },
    { id: "month", label: "Monthly", idx: "03" },
    { id: "year", label: "Yearly", idx: "04" },
  ];

  return (
    <div className="min-h-screen bg-[#F2F2F0] font-sans" style={{ fontFamily: "'Helvetica Neue', Helvetica, Arial, sans-serif" }}>
      <div className="max-w-xl mx-auto px-4 pt-6 pb-16">
        <DepartureBoard />

        <div className="flex mt-6 border-b border-neutral-300">
          {tabs.map((t) => (
            <button
              key={t.id}
              onClick={() => setView(t.id)}
              className={`flex-1 py-3 text-xs uppercase tracking-widest font-semibold transition-colors relative ${
                view === t.id ? "text-neutral-900" : "text-neutral-400 hover:text-neutral-600"
              }`}
            >
              <span className="text-[#DA291C] font-mono mr-1">{t.idx}</span>{t.label}
              {view === t.id && <span className="absolute left-0 right-0 -bottom-px h-[2px] bg-[#DA291C]" />}
            </button>
          ))}
        </div>

        <div className="bg-white rounded-b-md shadow-sm border border-t-0 border-neutral-200 px-5 py-6">
          {view === "day" && <DayView />}
          {view === "week" && <WeekView />}
          {view === "month" && <MonthView />}
          {view === "year" && <YearView />}
        </div>

        <div className="text-center text-[11px] text-neutral-400 mt-6 tracking-wide">
          Progress saves automatically on this device · personal to you
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
